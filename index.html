<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahuwer – En construcción</title>
    <meta name="description" content="Sitio en construcción. Próximamente.">
    <link rel="icon" type="image/png" href="images/logo-trans.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            height: 112px;
            margin-bottom: 1.5rem;
        }

        .construction-img {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
        }

        .btn-dossier {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .btn-dossier:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <img src="images/logo-trans.png" alt="Bahuwer" class="logo">
    <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=600&auto=format&fit=crop" 
         alt="Edificio en obras" 
         class="construction-img"
         loading="lazy">
    <h1>En construcción</h1>
    <a href="viewer.html" class="btn-dossier">📖 Ver Dossier Corporativo</a>
</body>
</html>
